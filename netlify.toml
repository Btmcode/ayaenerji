[build]
  command = "npm run build"
  publish = "dist"

[[edge_functions]]
  path = "/*"
  function = "meta-inject"

# Sadece domain yönlendirmeleri kalsın:
[[redirects]]
  from = "https://ayaelektrik.netlify.app/*"
  to = "https://ayaelektrik.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.ayaelektrik.com/*"
  to = "https://ayaelektrik.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
